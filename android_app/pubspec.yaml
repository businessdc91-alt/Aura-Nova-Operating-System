name: aura_nova_app
description: AuraNova Studios - AI-Powered Creative Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  glassmorphism_ui: ^0.3.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.0
  
  # Storage & Database
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Firebase (optional cloud features)
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # Code Editor
  flutter_code_editor: ^0.3.1
  highlight: ^0.7.0
  
  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
